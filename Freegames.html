<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Deals Clone</title>
    <style>
        body {
            background-color: #f4f4f4;
            color: black;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .container {
            display: flex;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }
        .game-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .game {
            display: flex;
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .game img {
            width: 100px;
            border-radius: 5px;
            margin-right: 10px;
        }
        .game h2 {
            margin: 0;
            font-size: 16px;
        }
        .game p span {
            color: #2e7d32;
            font-weight: bold;
        }
        .game:hover {
            background-color: #f0f0f0;
        }
        .game-details {
            width: 35%;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            min-height: 200px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .carousel img {
            width: 100%;
            height: 200px;
            border-radius: 5px;
            object-fit: cover;
        }
        .right {
            color: #2e7d32;
            font-size: 18px;
            font-weight: bold;
            margin-left: auto;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .game-list {
                width: 100%;
            }
            .game-details {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="game-list">
            <article class="game" onmouseover="showDetails('HUMANKIND', 'Free', '-100%', 'Epic Store', ['https://res.cloudinary.com/did8behwz/image/upload/v1739444015/xoiebhs1v8kv0gvib5zv.jpg'])">
                <img src="https://res.cloudinary.com/did8behwz/image/upload/v1739444015/xoiebhs1v8kv0gvib5zv.jpg" alt="Humankind">
                <div>
                    <h2>HUMANKIND</h2>
                    <p>Current Price: 0$ (-100%)</p>
                    <span class="right"><b>Free</b></span>
                </div>
            </article>
            <article class="game" onmouseover="showDetails('Beyond Blue', 'Free', '-100%', 'Epic Store', ['https://res.cloudinary.com/did8behwz/image/upload/v1739444015/mlo7hofkk08bbyd3wvgt.jpg'])">
                <img src="https://res.cloudinary.com/did8behwz/image/upload/v1739444015/mlo7hofkk08bbyd3wvgt.jpg" alt="Beyond Blue">
                <div>
                    <h2>Beyond Blue</h2>
                    <p>Current Price: 0$ (-100%)</p>
                    <span class="right"><b>Free</b></span>
                </div>
            </article>
        </section>
        <aside class="game-details" id="gameDetails">
            <div class="carousel" id="carousel">
                <img src="https://via.placeholder.com/400x200?text=Hover+Over+a+Game" id="carouselImage">
            </div>
            <div id="detailsText"></div>
        </aside>
    </div>
    
    <script>
        function showDetails(name, price, discount, store, images) {
            document.getElementById('carouselImage').src = images[0];
            document.getElementById('detailsText').innerHTML = `
                <h2>${name}</h2>
                <p>Price: <span>${price}</span></p>
                <p>Discount: <span>${discount}</span></p>
                <p>Store: <span>${store}</span></p>
            `;
        }
    </script>
</body>
</html>
