<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPNewz Twitter Embed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .twitter-container {
            width: 400px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .twitter-container h2 {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="twitter-container">
        <h2>Posts from @XPNewz</h2>
        <a class="twitter-timeline" data-theme="light" data-height="500" href="https://twitter.com/XPNewz">
            Tweets by XPNewz
        </a> 
    </div>

    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

</body>
</html>
